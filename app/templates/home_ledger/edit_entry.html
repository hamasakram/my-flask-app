{% extends "base.html" %}
{% block title %}Edit Ledger Entry - Home Ledger{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Ledger Entry</h1>
    <p class="page-subtitle">{{ entry.party.name }}</p>
</div>

<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="entry_date">Date</label>
            <input type="date" id="entry_date" name="entry_date" value="{{ entry.entry_date.isoformat() }}" required>
        </div>
        <div class="form-group">
            <label for="given">Given (paid out)</label>
            <input type="number" id="given" name="given" step="0.01" min="0" value="{{ entry.given }}">
        </div>
        <div class="form-group">
            <label for="received">Received (paid in)</label>
            <input type="number" id="received" name="received" step="0.01" min="0" value="{{ entry.received }}">
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="2">{{ entry.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
