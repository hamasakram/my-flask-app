{% extends "base.html" %}
{% block title %}Login - RN COLOUR Stock Management System{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-brand">
            <img
                src="{{ url_for('static', filename='images/rn-colour-logo.png') }}"
                alt="RN COLOUR"
                class="login-logo"
            >
            <p class="subtitle">Stock Management System</p>
            <p class="login-tagline">Multi-company printing ink inventory</p>
        </div>
        <form method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
