{% extends "base.html" %}
{% block title %}Login - RN Colors Stock Management System{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1>RN Colors Stock Management System</h1>
        <p class="subtitle">Multi-company printing ink inventory</p>
        <form method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <div class="login-hint">
            <p>Default accounts:</p>
            <ul>
                <li><strong>admin</strong> / admin123</li>
                <li><strong>manager</strong> / manager123</li>
                <li><strong>viewer</strong> / viewer123</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
