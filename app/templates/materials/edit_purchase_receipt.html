{% extends "base.html" %}
{% block title %}Edit Purchase Receipt - Materials{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Purchase Receipt</h1>
</div>
<div class="card">
    <form method="POST" enctype="multipart/form-data" class="form-grid">
        <div class="form-group">
            <label for="receipt_date">Receipt Date</label>
            <input type="date" id="receipt_date" name="receipt_date" value="{{ record.receipt_date.isoformat() }}" required>
        </div>
        <div class="form-group">
            <label for="company_id">Company</label>
            <select id="company_id" name="company_id" required>
                {% for c in companies %}
                <option value="{{ c.id }}" {% if c.id == record.company_id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="title">Description</label>
            <input type="text" id="title" name="title" value="{{ record.title or '' }}">
        </div>
        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" name="amount" step="0.01" min="0" value="{{ record.amount or '' }}">
        </div>
        <div class="form-group">
            <label for="material_transaction_id">Link to Stock Purchased</label>
            <select id="material_transaction_id" name="material_transaction_id">
                <option value="">None</option>
                {% for t in received_txns %}
                <option value="{{ t.id }}" {% if record.material_transaction_id == t.id %}selected{% endif %}>{{ t.transaction_date.strftime('%d-%m-%Y') }} — {{ t.material.display_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group full-width">
            <label for="screenshot">Replace File (optional)</label>
            <input type="file" id="screenshot" name="screenshot" accept=".png,.jpg,.jpeg,.gif,.webp,.pdf,image/*">
            <small class="field-note"><a href="{{ view_url }}" target="_blank">View current receipt</a></small>
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="2">{{ record.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
