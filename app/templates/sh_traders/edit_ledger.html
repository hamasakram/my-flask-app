{% extends "base.html" %}
{% block title %}Edit Ledger Entry - SH Traders{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Ledger Entry</h1>
</div>

<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="entry_date">Date</label>
            <input type="date" id="entry_date" name="entry_date" value="{{ entry.entry_date.isoformat() }}" required>
        </div>
        <div class="form-group">
            <label for="debit">Debit (out)</label>
            <input type="number" id="debit" name="debit" step="0.01" min="0" value="{{ entry.debit }}">
        </div>
        <div class="form-group">
            <label for="credit">Credit (in)</label>
            <input type="number" id="credit" name="credit" step="0.01" min="0" value="{{ entry.credit }}">
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="2">{{ entry.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
