{% extends "base.html" %}
{% block title %}Edit Company - {{ module_label }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Company</h1>
    <p class="page-subtitle">{{ module_label }} module</p>
</div>

{% if current_user.can_edit() %}
<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group full-width">
            <label for="company_name">Company Name</label>
            <input type="text" id="company_name" name="company_name" value="{{ company.name }}" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}
