{% extends "base.html" %}
{% block title %}Edit Ink - RN COLOUR{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Ink</h1>
    <p class="page-subtitle">{{ ink.company.name }}</p>
</div>
<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="ink_name">Ink Name</label>
            <input type="text" id="ink_name" name="ink_name" value="{{ ink.name }}" required>
        </div>
        <div class="form-group">
            <label for="color_code">Color Code</label>
            <input type="text" id="color_code" name="color_code" value="{{ ink.color_code or '' }}">
        </div>
        <div class="form-group">
            <label for="unit_type">Unit Type</label>
            <select id="unit_type" name="unit_type">
                <option value="">Select unit</option>
                {% for unit in unit_types %}
                <option value="{{ unit }}" {% if ink.unit_type == unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
