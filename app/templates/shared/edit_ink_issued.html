{% extends "base.html" %}
{% block title %}Edit Issue Record{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Issue from Storage</h1>
    <p class="page-subtitle">{{ txn.company.name }} — {{ txn.ink_type.name }}</p>
</div>

{% if current_user.can_edit() %}
<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="company_id">Company</label>
            <select id="company_id" name="company_id" required>
                {% for company in companies %}
                <option value="{{ company.id }}" {% if company.id == txn.company_id %}selected{% endif %}>{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ink_type_id">Ink</label>
            <select id="ink_type_id" name="ink_type_id" required>
                <option value="{{ txn.ink_type_id }}">{{ txn.ink_type.name }}</option>
            </select>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity Issued</label>
            <input type="number" id="quantity" name="quantity" step="0.1" min="0.1" value="{{ txn.quantity }}" required>
        </div>
        <div class="form-group">
            <label for="transaction_date">Issue Date</label>
            <input type="date" id="transaction_date" name="transaction_date" value="{{ txn.transaction_date.isoformat() }}" required>
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="2">{{ txn.notes or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}

{% block scripts %}
<script>
const companySelect = document.getElementById('company_id');
const inkSelect = document.getElementById('ink_type_id');
const selectedInkId = {{ txn.ink_type_id }};

companySelect?.addEventListener('change', async function() {
    if (!this.value) return;
    const res = await fetch(`/inventory/api/inks/${this.value}`);
    const inks = await res.json();
    inkSelect.innerHTML = '';
    inks.forEach(ink => {
        const opt = document.createElement('option');
        opt.value = ink.id;
        opt.textContent = ink.name;
        if (ink.id === selectedInkId) opt.selected = true;
        inkSelect.appendChild(opt);
    });
});
</script>
{% endblock %}
