{% extends "base.html" %}
{% block title %}Edit Opening Stock - RN COLOUR{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Opening Stock</h1>
    <p class="page-subtitle">{{ record.company.name }} — {{ record.ink_type.name }}</p>
</div>

<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="company_id">Company</label>
            <select id="company_id" name="company_id" required>
                {% for company in companies %}
                <option value="{{ company.id }}" {% if company.id == record.company_id %}selected{% endif %}>{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ink_type_id">Ink</label>
            <select id="ink_type_id" name="ink_type_id" required>
                <option value="">Loading...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" step="0.1" min="0" value="{{ record.quantity }}" required>
        </div>
        <div class="form-group">
            <label for="as_of_date">As of Date</label>
            <input type="date" id="as_of_date" name="as_of_date" value="{{ record.as_of_date.isoformat() }}" required>
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <input type="text" id="notes" name="notes" value="{{ record.notes or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const companySelect = document.getElementById('company_id');
const inkSelect = document.getElementById('ink_type_id');
const selectedInkId = '{{ record.ink_type_id }}';

async function loadInks(companyId, selectId) {
    inkSelect.innerHTML = '<option value="">Loading...</option>';
    const res = await fetch(`/inventory/api/inks/${companyId}`);
    const inks = await res.json();
    inkSelect.innerHTML = '<option value="">Select ink</option>';
    inks.forEach(ink => {
        const opt = document.createElement('option');
        opt.value = ink.id;
        opt.textContent = ink.name + (ink.color_code ? ` (${ink.color_code})` : '');
        if (String(ink.id) === String(selectId)) opt.selected = true;
        inkSelect.appendChild(opt);
    });
}

companySelect?.addEventListener('change', function() {
    if (this.value) loadInks(this.value, '');
});

if (companySelect.value) loadInks(companySelect.value, selectedInkId);
</script>
{% endblock %}
