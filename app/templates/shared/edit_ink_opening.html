{% extends "base.html" %}
{% block title %}Edit Opening Stock - RN COLOUR{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Opening Stock</h1>
    <p class="page-subtitle">{{ record.company.name }} — {{ record.ink_type.name }}</p>
</div>

{% if current_user.can_edit() %}
<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="company_id">Company</label>
            <select id="company_id" name="company_id" required>
                {% for company in companies %}
                <option value="{{ company.id }}" {% if company.id == record.company_id %}selected{% endif %}>{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ink_name">Ink Name</label>
            <input type="text" id="ink_name" name="ink_name" value="{{ record.ink_type.name }}" required>
        </div>
        <div class="form-group">
            <label for="color_code">Color Code</label>
            <input type="text" id="color_code" name="color_code" value="{{ record.ink_type.color_code or '' }}">
        </div>
        <div class="form-group">
            <label for="unit_type">Unit Type</label>
            <select id="unit_type" name="unit_type">
                <option value="">Select unit</option>
                {% for unit in unit_types %}
                <option value="{{ unit }}" {% if record.ink_type.unit_type == unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" step="0.1" min="0" value="{{ record.quantity }}" required>
        </div>
        <div class="form-group">
            <label for="as_of_date">As of Date</label>
            <input type="date" id="as_of_date" name="as_of_date" value="{{ record.as_of_date.isoformat() }}" required>
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <input type="text" id="notes" name="notes" value="{{ record.notes or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}
