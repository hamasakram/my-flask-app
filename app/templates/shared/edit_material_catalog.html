{% extends "base.html" %}
{% block title %}Edit Material{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Material</h1>
    <p class="page-subtitle">{{ material.display_name }}</p>
</div>

{% if current_user.can_edit() %}
<div class="card highlight-card">
    <form method="POST" class="form-grid">
        <div class="form-group full-width">
            <label>Category</label>
            <div class="category-options">
                {% for cat in categories %}
                <label class="category-option">
                    <input type="radio" name="category" value="{{ cat }}" {% if material.category == cat %}checked{% endif %} required> {{ cat }}
                </label>
                {% endfor %}
            </div>
        </div>
        <div class="form-group">
            <label for="material_name">Item Name</label>
            <input type="text" id="material_name" name="material_name" value="{{ material.name }}" required>
        </div>
        <div class="form-group">
            <label for="size">Size</label>
            <input type="text" id="size" name="size" value="{{ material.size or '' }}">
        </div>
        <div class="form-group">
            <label for="micron">Micron</label>
            <input type="text" id="micron" name="micron" value="{{ material.micron or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}
