{% extends "base.html" %}
{% block title %}Edit Opening Stock - Materials{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Opening Stock</h1>
    <p class="page-subtitle">{{ record.material_name }}</p>
</div>

{% if current_user.can_edit() %}
<div class="card">
    <form method="POST" class="form-grid">
        <div class="form-group full-width">
            <label for="material_name">Material</label>
            <input type="text" id="material_name" name="material_name" value="{{ record.material_name }}" required>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity (kg)</label>
            <input type="number" id="quantity" name="quantity" step="0.1" min="0" value="{{ record.quantity }}" required>
        </div>
        <div class="form-group">
            <label for="as_of_date">As of Date</label>
            <input type="date" id="as_of_date" name="as_of_date" value="{{ record.as_of_date.isoformat() }}" required>
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <input type="text" id="notes" name="notes" value="{{ record.notes or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endif %}
{% endblock %}
