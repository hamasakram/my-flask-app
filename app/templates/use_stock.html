{% extends "base.html" %}
{% block title %}Stock Used - RN Colors{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Stock Used</h1>
    <p class="page-subtitle">Record daily ink consumption</p>
</div>

{% if current_user.can_edit() %}
<div class="card">
    <h2>Record Stock Usage</h2>
    <form method="POST" class="form-grid">
        <div class="form-group">
            <label for="company_id">Company</label>
            <select id="company_id" name="company_id" required>
                <option value="">Select company</option>
                {% for company in companies %}
                <option value="{{ company.id }}">{{ company.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="ink_type_id">Ink Type</label>
            <select id="ink_type_id" name="ink_type_id" required disabled>
                <option value="">Select company first</option>
            </select>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity Used</label>
            <input type="number" id="quantity" name="quantity" step="0.1" min="0.1" required>
        </div>
        <div class="form-group">
            <label for="transaction_date">Usage Date</label>
            <input type="date" id="transaction_date" name="transaction_date" required>
        </div>
        <div class="form-group full-width">
            <label for="notes">Notes</label>
            <input type="text" id="notes" name="notes" placeholder="Job reference, machine, etc.">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Stock Used</button>
        </div>
    </form>
</div>
{% else %}
<div class="card"><p class="empty-state">You have view-only access.</p></div>
{% endif %}
{% endblock %}

{% block scripts %}
<script>
const companySelect = document.getElementById('company_id');
const inkSelect = document.getElementById('ink_type_id');

companySelect?.addEventListener('change', async function() {
    inkSelect.innerHTML = '<option value="">Loading...</option>';
    inkSelect.disabled = true;
    if (!this.value) {
        inkSelect.innerHTML = '<option value="">Select company first</option>';
        return;
    }
    const res = await fetch(`/inventory/api/inks/${this.value}`);
    const inks = await res.json();
    inkSelect.innerHTML = '<option value="">Select ink</option>';
    inks.forEach(ink => {
        const opt = document.createElement('option');
        opt.value = ink.id;
        opt.textContent = ink.name;
        inkSelect.appendChild(opt);
    });
    inkSelect.disabled = false;
});

document.getElementById('transaction_date').valueAsDate = new Date();
</script>
{% endblock %}
